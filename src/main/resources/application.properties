# ============================================================================
# Financas Spring — application.properties (Base / Defaults seguros)
# ============================================================================
# Profile é controlado EXTERNAMENTE via SPRING_PROFILES_ACTIVE.
# Se não definido, nenhum profile extra é ativado e estes defaults são usados.
# ============================================================================

spring.application.name=FinancasSpring

# ── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA (defaults seguros para produção) ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.baseline-on-migrate=true

# ── Docker Compose (desabilitado — gerenciado externamente) ──────────────────
spring.docker.compose.enabled=false

# ── Logging ──────────────────────────────────────────────────────────────────
# Pattern com MDC chatId para correlação de logs do bot
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [chatId=%X{chatId:-}] %-5level %logger{36} - %msg%n