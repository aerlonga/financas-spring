# Banco local (Postgres rodando no WSL ou Docker)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

JWT_SECRET=local_secret_key_1234567890_abcdef_123456
# 1 hora em milissegundos
jwt.expiration=3600000

# Telegram
bot.telegram.token=${TELEGRAM_TOKEN:SEU_TOKEN_DO_BOTFATHER}
bot.telegram.username=${TELEGRAM_BOT_USERNAME:nome_do_bot}

# Gemini (Google AI)
bot.gemini.api-key=${GEMINI_API_KEY:SUA_CHAVE_GEMINI}
bot.gemini.model=gemini-3.1-flash
bot.gemini.max-tokens=1024
bot.gemini.temperature=0.3

# Memória de conversa
bot.memory.max-messages=20
bot.memory.ttl-days=30

# Cotações
bot.currency.api-url=https://economia.awesomeapi.com.br/json/last

# System Prompt da IA (externalizado para ajustes sem recompilar)
bot.ai.system-prompt=Você é um assistente financeiro pessoal via Telegram. \
Responda SEMPRE em Português do Brasil. Seja direto e objetivo. \
Foco exclusivo em finanças pessoais, gastos, economias, orçamentos e mercado financeiro. \
Para temas fora de finanças, responda: "Sou especializado em finanças. Use !help." \
NUNCA invente valores. Use as ferramentas disponíveis. \
Ao registrar gastos, confirme os dados antes de registrar.
