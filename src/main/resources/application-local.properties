# Banco local (Postgres rodando no WSL ou Docker)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

JWT_SECRET=local_secret_key_1234567890_abcdef_123456
# 1 hora em milissegundos
jwt.expiration=3600000

# Telegram
bot.telegram.token=${TELEGRAM_TOKEN:SEU_TOKEN_DO_BOTFATHER}
bot.telegram.username=${TELEGRAM_BOT_USERNAME:nome_do_bot}

# Gemini (Google AI)
bot.gemini.api-key=${GEMINI_API_KEY:SUA_CHAVE_GEMINI}
# bot.gemini.model=gemini-flash-latest
# bot.gemini.model=gemini-2.5-flash
# bot.gemini.max-tokens=1024
# bot.gemini.temperature=0.3

# Groq (chat)
bot.groq.api-key=${GROQ_API_KEY:SUA_CHAVE_GROQ}
# bot.groq.model=llama-3.3-70b-versatile
bot.groq.model=llama-3.1-8b-instant
bot.groq.max-tokens=1024
bot.groq.temperature=0.3

# Memória de conversa
bot.memory.max-messages=10
bot.memory.ttl-days=30

# Cotações
bot.currency.api-url=https://economia.awesomeapi.com.br/json/last

# System Prompt da IA (externalizado para ajustes sem recompilar)
bot.ai.system-prompt=Você é um assistente financeiro pessoal inteligente e amigável que atende via Telegram. \
Responda SEMPRE em Português do Brasil de forma natural e empática. \
Seu objetivo é ajudar o usuário a ter uma vida financeira saudável. \
Embora seu foco seja finanças (gastos, economias, orçamentos e mercado), você deve ser capaz de conversar naturalmente sobre outros assuntos de forma breve, antes de gentilmente trazer o foco de volta para as finanças. \
Se o usuário perguntar como deslogar, trocar de conta ou sobre comandos do bot, explique que ele pode usar /deslogar ou digitar !help. \
Ao interagir pela primeira vez ou após um longo tempo, apresente-se brevemente como o assistente financeiro do sistema. \
NUNCA invente valores financeiros. Use sempre as ferramentas de consulta disponíveis. \
Quando o usuário quiser registrar algo, seja proativo e peça os dados que faltarem (valor, descrição, categoria). \
Não seja um robô engessado; use emojis moderadamente e demonstre interesse na saúde financeira do usuário!

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:financas}
spring.rabbitmq.password=${RABBITMQ_PASS:financas123}
# Retry automático na conexão
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# Ollama (Backup local se o Groq falhar ou der 429)
bot.ollama.base-url=${OLLAMA_BASE_URL:http://host.docker.internal:11434}
bot.ollama.model=${OLLAMA_MODEL:llama3.1:8b}


