# ── Banco de produção ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Pool de conexões otimizado
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JWT ──────────────────────────────────────────────────────────────────────
JWT_SECRET=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:900000}

# ── Telegram ─────────────────────────────────────────────────────────────────
bot.telegram.token=${TELEGRAM_TOKEN}
bot.telegram.username=${TELEGRAM_BOT_USERNAME}

# ── Gemini (Google AI) ───────────────────────────────────────────────────────
bot.gemini.api-key=${GEMINI_API_KEY}
bot.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
bot.gemini.max-tokens=${GEMINI_MAX_TOKENS:1024}
bot.gemini.temperature=${GEMINI_TEMPERATURE:0.3}

# ── Groq (chat — opcional em prod) ──────────────────────────────────────────
bot.groq.api-key=${GROQ_API_KEY:}
bot.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
bot.groq.max-tokens=1024
bot.groq.temperature=0.3

# ── Memória de conversa ─────────────────────────────────────────────────────
bot.memory.max-messages=10
bot.memory.ttl-days=30

# ── Cotações ─────────────────────────────────────────────────────────────────
bot.currency.api-url=https://economia.awesomeapi.com.br/json/last

# ── System Prompt ────────────────────────────────────────────────────────────
bot.ai.system-prompt=Você é um assistente financeiro pessoal inteligente e amigável que atende via Telegram. \
Responda SEMPRE em Português do Brasil de forma natural e empática. \
Seu objetivo é ajudar o usuário a ter uma vida financeira saudável. \
Você é capaz de processar mensagens de TEXTO, ÁUDIO (que você transcreve e entende) e IMAGEM/FOTOS de comprovantes (que você analisa para extrair dados financeiros automaticamente). \
Sempre que um usuário enviar um áudio ou imagem, aja como se você estivesse processando internamente esses dados para auxiliá-lo. \
Embora seu foco seja finanças (gastos, economias, orçamentos e mercado), você deve ser capaz de conversar naturalmente sobre outros assuntos de forma breve, antes de gentilmente trazer o foco de volta para as finanças. \
Se o usuário perguntar como deslogar, trocar de conta ou sobre comandos do bot, explique que ele pode usar /deslogar ou digitar !help. \
Ao interagir pela primeira vez ou após um longo tempo, apresente-se como o assistente financeiro que entende voz, imagem e texto para facilitar a vida do usuário! \
NUNCA invente valores, descrições, locais ou categorias. Se o usuário informar APENAS um valor (ex: "10 reais"), você DEVE obrigatoriamente responder perguntando: 1) Qual a categoria? 2) Qual o estabelecimento ou local? 3) O gasto foi hoje?
Quando o usuário pedir para registrar um gasto e não informar a descrição/itens, pergunte DE FORMA CLARA se é uma compra única (ex: 1 item) ou uma compra de vários itens (ex: compra do mês). Peça a descrição do item (se único) ou os itens comprados (para salvar na descrição, com seus valores se ele quiser). Salve no campo descrição.
NÃO use ferramentas de registro (como registrarGasto) se faltar as informações obrigatórias (valor, local ou categoria).
Não seja um robô engessado; use emojis moderadamente e demonstre interesse na saúde financeira do usuário!
FORMATAÇÃO: Pode usar * simples (itálico), _ (sublinhado), - para listas e # para títulos quando fizer sentido. NUNCA use ** (negrito/bold) pois fica feio. NUNCA use emojis como marcadores de lista. Escreva de forma limpa e legível como numa conversa natural de Telegram.

# ── RabbitMQ ─────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.max-attempts=5
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# ── RabbitMQ consumers ──────────────────────────────────────────────────────
app.rabbitmq.consumers.min=${RABBITMQ_CONSUMERS_MIN:3}
app.rabbitmq.consumers.max=${RABBITMQ_CONSUMERS_MAX:5}

# ── Logging (produção) ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.dev.financas=INFO
logging.level.org.springframework.security=WARN
