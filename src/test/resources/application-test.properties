# ============================================================================
# Financas Spring — application-test.properties (Testes Automatizados)
# ============================================================================
# Usa H2 em memória + Flyway com scripts SQL compatíveis com H2.
# Nenhuma dependência externa (sem Postgres, RabbitMQ, Telegram, Gemini).
# ============================================================================

spring.application.name=FinancasSpring

# ── Datasource H2 em memória ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── Flyway (usa scripts H2-compatíveis) ─────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration-test
spring.flyway.baseline-on-migrate=true

# ── Docker Compose (desabilitado) ────────────────────────────────────────────
spring.docker.compose.enabled=false

# ── JWT (valores dummy para testes) ──────────────────────────────────────────
JWT_SECRET=test-secret-key-with-at-least-32-characters-for-jwt
jwt.expiration=3600000

# ── Telegram (dummy) ────────────────────────────────────────────────────────
bot.telegram.token=TEST_TOKEN
bot.telegram.username=test_bot

# ── Gemini (dummy) ──────────────────────────────────────────────────────────
bot.gemini.api-key=TEST_GEMINI_KEY
bot.gemini.model=gemini-2.5-flash
bot.gemini.max-tokens=1024
bot.gemini.temperature=0.3

# ── Groq (dummy) ────────────────────────────────────────────────────────────
bot.groq.api-key=TEST_GROQ_KEY
bot.groq.model=llama-3.3-70b-versatile
bot.groq.max-tokens=1024
bot.groq.temperature=0.3

# ── Bot configs ─────────────────────────────────────────────────────────────
bot.memory.max-messages=10
bot.memory.ttl-days=30
bot.currency.api-url=https://economia.awesomeapi.com.br/json/last
bot.ai.system-prompt=Assistente de teste

# ── RabbitMQ (desabilitado para testes) ─────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# ── RabbitMQ consumers (configurável) ────────────────────────────────────────
app.rabbitmq.consumers.min=1
app.rabbitmq.consumers.max=1
